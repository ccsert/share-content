<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI协作开发工程化实践</title>
</head>
<body>

<!-- 自定义光标元素 -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div id="progress-bar"></div>

<div id="slides-wrapper">
  <!-- 幻灯片由 JS 动态渲染 -->
</div>

<div id="nav">
  <button class="nav-btn hover-target" id="prevBtn" onclick="changeSlide(-1)" disabled>← 上一页</button>
  <div class="nav-dots" id="navDots"></div>
  <span style="font-family:monospace;font-size:14px;color:var(--text-muted);min-width:60px;text-align:center;" id="slide-counter">1 / 19</span>
  <button class="nav-btn hover-target" id="nextBtn" onclick="changeSlide(1)">下一页 →</button>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
